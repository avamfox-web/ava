<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classical Mood Matcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0c0a;
      --surface: #1c1814;
      --gold: #c9a96e;
      --cream: #f0e8d8;
      --muted: #7a6e60;
      --border: #2e2820;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--gold); }
    nav .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      color: var(--gold);
      letter-spacing: 2px;
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 300;
      text-align: center;
      letter-spacing: 2px;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .tagline em { color: var(--gold); font-style: italic; }

    .sub {
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    /* MOOD BUTTONS */
    .mood-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 2rem;
    }
    .mood-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 14px 10px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }
    .mood-btn:hover, .mood-btn.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    /* SUBMIT */
    #ask-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 14px 44px;
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 2.5rem;
    }
    #ask-btn:hover:not(:disabled) {
      background: var(--gold);
      color: var(--bg);
    }
    #ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* RESULT */
    #result-box {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem 2.4rem;
      display: none;
      animation: fadeIn 0.6s ease;
    }
    #result-box.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    #result-box .piece-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }
    #result-box .composer {
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    #result-box .description {
      font-size: 0.97rem;
      line-height: 1.8;
      color: #ccc;
      border-left: 2px solid var(--gold);
      padding-left: 1rem;
    }

    /* LOADER */
    #loader {
      display: none;
      text-align: center;
      padding: 1.5rem;
    }
    #loader.show { display: block; }
    .dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      margin: 0 4px;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-10px); opacity: 1; }
    }

    #error-msg {
      color: #e07070;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }

    /* AGAIN */
    #again-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 1.5rem;
      display: none;
      transition: color 0.2s;
    }
    #again-btn:hover { color: var(--gold); }
    #again-btn.show { display: block; }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <a href="scratch.html">← Scratch Page</a>
    <span class="brand">🎹 Mood Matcher</span>
    <a href="index.html">Portfolio →</a>
  </nav>

  <main>
    <h1 class="tagline">How are you <em>feeling</em> today?</h1>
    <p class="sub">Get a classical piece matched to your mood</p>

    <div class="mood-grid" id="mood-grid">
      <button class="mood-btn" data-mood="melancholic">Melancholic</button>
      <button class="mood-btn" data-mood="peaceful">Peaceful</button>
      <button class="mood-btn" data-mood="energetic">Energetic</button>
      <button class="mood-btn" data-mood="romantic">Romantic</button>
      <button class="mood-btn" data-mood="anxious">Anxious</button>
      <button class="mood-btn" data-mood="hopeful">Hopeful</button>
      <button class="mood-btn" data-mood="nostalgic">Nostalgic</button>
      <button class="mood-btn" data-mood="joyful">Joyful</button>
      <button class="mood-btn" data-mood="contemplative">Thoughtful</button>
    </div>

    <button id="ask-btn" disabled>Find My Piece</button>

    <div id="loader">
      <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <div id="result-box">
      <div class="piece-name" id="piece-name"></div>
      <div class="composer" id="composer"></div>
      <div class="description" id="description"></div>
    </div>

    <p id="error-msg">Something went wrong. Please try again.</p>
    <button id="again-btn">Try Another Mood ↺</button>
  </main>

  <footer>
    Built by Ava Fox &nbsp;·&nbsp; <a href="scratch.html">Piano Page</a> &nbsp;·&nbsp; <a href="index.html">Portfolio</a>
  </footer>

  <script>
    let selectedMood = null;

    // Mood selection
    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedMood = btn.dataset.mood;
        document.getElementById('ask-btn').disabled = false;
      });
    });

    // Get recommendation
    document.getElementById('ask-btn').addEventListener('click', async () => {
      if (!selectedMood) return;

      // UI states
      document.getElementById('loader').classList.add('show');
      document.getElementById('result-box').classList.remove('show');
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('again-btn').classList.remove('show');
      document.getElementById('ask-btn').disabled = true;

      const prompt = `You are a classical music expert. The user is feeling "${selectedMood}" right now.

Recommend ONE perfect classical piano piece for this mood.

Respond ONLY with valid JSON in this exact format (no markdown, no extra text):
{
  "piece": "Full piece name including opus/key if applicable",
  "composer": "Composer full name (years)",
  "description": "2-3 sentences explaining why this piece matches the mood and what makes it special. Be poetic and personal."
}`;

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }]
          })
        });

        const data = await response.json();
        const raw = data.content.map(i => i.text || '').join('');
        const clean = raw.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);

        document.getElementById('piece-name').textContent = parsed.piece;
        document.getElementById('composer').textContent = parsed.composer;
        document.getElementById('description').textContent = parsed.description;

        document.getElementById('loader').classList.remove('show');
        document.getElementById('result-box').classList.add('show');
        document.getElementById('again-btn').classList.add('show');

      } catch (err) {
        console.error(err);
        document.getElementById('loader').classList.remove('show');
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('ask-btn').disabled = false;
      }
    });

    // Reset
    document.getElementById('again-btn').addEventListener('click', () => {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      selectedMood = null;
      document.getElementById('ask-btn').disabled = true;
      document.getElementById('result-box').classList.remove('show');
      document.getElementById('again-btn').classList.remove('show');
      document.getElementById('error-msg').style.display = 'none';
    });
  </script>

</body>
</html>
